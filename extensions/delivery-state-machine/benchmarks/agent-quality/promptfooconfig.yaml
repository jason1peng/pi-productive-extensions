      task: "Identify only evidence-backed lessons and do not invent a critical fix from excluded speculation."
  - description: REV-01 dsm.reviewer
    vars:
      scenarioId: REV-01
      candidate: dsm.reviewer
      repetition: 0
      task: "Review the candidate for supported-workflow destructive data loss and provide a realistic reproducer and safeguard gap."
  - description: REV-01 reviewer
